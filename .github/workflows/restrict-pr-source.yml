name: Restrict PR to develop branch only

on:
  pull_request:
    branches:
      - master

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        if: github.head_ref != 'develop'
        run: |
          echo "❌ PRs to master are only allowed from the 'develop' branch."
          echo "Current source branch: ${{ github.head_ref }}"
          exit 1
